search_ports:
  - "/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0"
baudrate: 115200

# 三通道配置 (TDM 分时复用)
# 斜坡/锯齿波 (Ramp/Sawtooth) 信号配置
# 信号从 +5V 衰减到 -5V，周期 10s
#
# FY8300 波形代码:
#   CH1: 8=正锯齿, 9=反锯齿
#   CH2/CH3: 7=正锯齿, 8=反锯齿

initial_configs:
  - channel_index: 1
    waveform: 8          # 正锯齿
    frequency: 0.1        # 周期 10s
    amplitude: 5.0        # 峰峰值 10V (5V to -5V)
    offset: 0.0           # 中心点 0V
    phase: 0.0
    duty_cycle: 0.0
    output_en: false
    output_sync: false
  - channel_index: 2
    waveform: 7          # 正锯齿
    frequency: 0.1
    amplitude: 5.0
    offset: 0.0
    phase: 0.0
    duty_cycle: 0.0
    output_en: false
    output_sync: false
  - channel_index: 3
    waveform: 7          # 正锯齿
    frequency: 0.1
    amplitude: 5.0
    offset: 0.0
    phase: 0.0
    duty_cycle: 0.0
    output_en: false
    output_sync: false
