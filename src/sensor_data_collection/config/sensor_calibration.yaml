# Sensor Calibration Parameters
# Rotation correction matrices for 4 groups of 3 sensors
# Each group has different orientation, R_corr transforms sensor frame to common reference frame

# Sensors 1-3 (R1)
r_corr_r1: [1, 0, 0, 0, 0, -1, 0, 1, 0]
# Sensors 4-6 (R2)
r_corr_r2: [1, 0, 0, 0, 0, 1, 0, -1, 0]
# Sensors 7-9 (R3)
r_corr_r3: [-1, 0, 0, 0, 0, 1, 0, 1, 0]
# Sensors 10-12 (R4)
r_corr_r4: [-1, 0, 0, 0, 0, -1, 0, -1, 0]

# Sensor physical offset positions relative to array center (units: m)
# 12 sensors in order, [x, y, z]
d_list:
  - [-0.001, 0.00105, -0.001]    # sensor 1
  - [-0.001, 0.00105,  0     ]   # sensor 2
  - [-0.001, 0.00105,  0.001]    # sensor 3
  - [-0.001, -0.00105, -0.001]   # sensor 4
  - [-0.001, -0.00105,  0     ]  # sensor 5
  - [-0.001, -0.00105,  0.001]   # sensor 6
  - [0.001, 0.00105, -0.001]     # sensor 7
  - [0.001, 0.00105,  0     ]    # sensor 8
  - [0.001, 0.00105,  0.001]     # sensor 9
  - [0.001, -0.00105, -0.001]    # sensor 10
  - [0.001, -0.00105,  0     ]   # sensor 11
  - [0.001, -0.00105,  0.001]    # sensor 12

# Unit conversion: Gs -> Tesla
gs_to_tesla: 1.0e-4
