# CCI (Constant-Current Mode) 采集参数
# mode 由 task_params.yaml 统一指定，此处只写本模式特有的参数

bitmap: 0x0FFF             # bit0=sensor1, bit11=sensor12, 0x0FFF=全部12个
settling_time: 2000         # 单位 0.01ms, 例如 6000 = 60.00ms
sampling_time: 300          # 单位 0.01ms, 例如 3000 = 3.00ms
cycle_time: 6900          # 单位 0.01ms, 最大 10000.00ms,
