# CVT (Constant-Voltage Mode) 采集参数
# mode 由 task_params.yaml 统一指定，此处只写本模式特有的参数
# cycle_time 由 data_collection_node 根据 sampling_time 和 settling_time 自动计算

bitmap: 0x0FFF             # bit0=sensor1, bit11=sensor12, 0x0FFF=全部12个
settling_time: 30000         # 单位 0.01ms, 例如 6000 = 60.00ms
sampling_time: 1400         # 单位 0.01ms, 例如 1200 = 12.00ms

