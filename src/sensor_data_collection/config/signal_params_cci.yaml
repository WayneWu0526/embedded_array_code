# CCI (Constant-Current Mode) 信号参数
# 闭环电流调节，settling time 可很短，频率较高

search_ports:
  - "/dev/ttyUSB0"
baudrate: 115200

# TDM 时序参数
tdm:
  M: 3                    # EM 源数量
  Ts: 0.003              # 采样周期 (s)
  k_tau: 0.1               # τ 倍数 (CCI 模式只需 1~2τ)
  # 计算得出:
  # tau = L/R
  # T_delta = k_tau * tau + Ts
  # period = (M+1) * T_delta
  # frequency = 1/period

# 三通道配置 (TDM 分时复用)
initial_configs:
  - channel_index: 1
    waveform: 2          # 矩形波
    frequency: 1.0       # 由 T_delta 决定，可更高
    amplitude: 5.0
    offset: 2.5
    phase: 0.0           # 第一个激活
    duty_cycle: 33.0     # 占空比 (3通道时分)
    output_en: true
    output_sync: true
  - channel_index: 2
    waveform: 2
    frequency: 1.0
    amplitude: 5.0
    offset: 2.5
    phase: 120.0         # 第二个激活
    duty_cycle: 33.0
    output_en: true
  - channel_index: 3
    waveform: 2
    frequency: 1.0
    amplitude: 5.0
    offset: 2.5
    phase: 240.0         # 第三个激活
    duty_cycle: 33.0
    output_en: true
