# 通用任务参数
mode: "CVT"              # CVT 或 CCI
num_cycles: 10
# 手动模式专用参数（manual_trigger=true 时使用）
num_frames_to_average: 5    # 每个位置采集的帧数做平均

# Slot -> TF frame 映射
# key 为 slot 编号（字符串），value 为 frame 名称，"null" 表示该 slot 无 pose
slot_frame_mapping:
  "0": "diana7_em_tcp_filt"
  "1": "arm2_em_tcp_filt"
  "2": "arm1_em_tcp_filt"
  "3": "null"
# 注意：手动模式复用 slot_frame_mapping，slot 数量由 mode 决定（CVT=4, CCI=3）